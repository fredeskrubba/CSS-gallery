<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS gallery</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <header>
        <h1>CSS Gallery</h1>
    </header>
    <section class="gallery">
        <article class="painting-card">
            <div class="painting sun-painting">
                <div class="field"></div>
                <div class="sky"></div>
                <div class="sun"></div>
            </div>
            <div class="description">
                <p>A field with a sky and a sun. Very pretty</p>
            </div>
        </article>
        <article class="painting-card">
            <div class="painting night-painting">
                <div class="night-field"></div>
                <div class="night-sky"></div>
                <div class="moon"></div>
            </div>
            <div class="description">
                <p>Now it's night</p>
            </div>
        </article>

    </section>
</body>
</html>
