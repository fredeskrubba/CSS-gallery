<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS gallery</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <section class="gallery">
        <article class="painting-card">
            <div class="painting sun-painting">
                <div class="field"></div>
                <div class="sky"></div>
                <div class="sun"></div>
            </div>
            <div class="description">
                <p>A field with a sky and a sun. Very pretty</p>
            </div>
        </article>
        <article class="painting-card">
            <div class="painting night-painting">
                <div class="night-field"></div>
                <div class="night-sky"></div>
                <div class="moon"></div>
            </div>
            <div class="description">
                <p>Now it's night</p>
            </div>
        </article>
        <article class="painting-card">
            <div class="painting">
                <div class="flower-wall"></div>
                <div class="window">
                    <div class="horizontal-bar"></div>
                    <div class="vertical-bar"></div>
                </div>
                <div class="flower-table">
                </div>
                <div class="table-leg"></div>
                <div class="flower">
                    <div class="petals"></div>
                    <div class="trunk">
                        <div class="left-branch"></div>
                        <div class="right-branch"></div>
                    </div>
                    <div class="vase"></div>
                </div>
            </div>
            <div class="description">
                <p>A flower on a table</p>
            </div>
        </article>
        <article class="painting-card">
            <div class="painting city-painting">
                <div class="city-background"></div>
            </div>
            <div class="description">
                <p>A city in the rain</p>
            </div>
        </article>
    </section>
</body>
</html>
